name: Deploy to All Offices

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  pre-deploy-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (for Firebase Emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Functions Dependencies
        run: npm install
        working-directory: apps/backend/functions

      - name: Run Backend Integration Tests
        run: npm run test:integration
        working-directory: apps/backend

      - name: Run Security Rules Tests (with Emulators)
        run: npm run test:rules
        working-directory: apps/backend

  release:
    needs: pre-deploy-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push tags and commit changelog/package.json
      issues: write # Required to comment on released issues
      pull-requests: write # Required to comment on released PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        working-directory: apps/portal/pwa-client
        
      - name: Semantic Release
        run: npx semantic-release
        working-directory: apps/portal/pwa-client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prepare-matrix:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Matrix
        id: set-matrix
        # In a real scenario, this could read from a JSON file or a script
        # For now, we assume a clients.json file exists in the root or apps/portal
        run: |
          if [ -f "apps/portal/clients.json" ]; then
            # Extract project IDs as a JSON array
            PROJECTS=$(jq -c '[.[] | .projectId]' apps/portal/clients.json)
            echo "matrix={\"project\":$PROJECTS}" >> $GITHUB_OUTPUT
          else
            # Fallback to a default or fail
            echo "matrix={\"project\":[\"finlogia-demo\"]}" >> $GITHUB_OUTPUT
          fi

  deploy-backend:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false # Don't fail all deployments if one fails
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: apps/backend/functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # A service account with permissions across projects, or use Workload Identity Federation

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Enable Firebase Rules API
        run: |
          gcloud services enable firebaserules.googleapis.com --project ${{ matrix.project }} || echo "Failed to enable API, it might already be enabled or lack permissions. Continuing..."
          # Wait a few seconds for the API enablement to propagate
          sleep 10

      - name: Generate Backend Config for ${{ matrix.project }}
        run: |
          echo "SERVICE_ACCOUNT_EMAIL=firebase-adminsdk-fbsvc@${{ matrix.project }}.iam.gserviceaccount.com" > .env.${{ matrix.project }}
          echo "REGION=europe-west3" >> .env.${{ matrix.project }}
          echo "GCS_BUCKET=${{ matrix.project }}.appspot.com" >> .env.${{ matrix.project }}
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> .env.${{ matrix.project }}
          echo "SENDGRID_FROM_EMAIL=noreply@finlogia.online" >> .env.${{ matrix.project }}
        working-directory: apps/backend/functions

      - name: Deploy Backend to ${{ matrix.project }}
        run: firebase deploy --only functions,firestore:rules,storage --project ${{ matrix.project }} --force
        working-directory: apps/backend

  deploy-portal:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/portal/pwa-client

      - name: Generate Config for ${{ matrix.project }}
        run: |
          # Extract client config
          CLIENT_CONFIG=$(jq -c ".[] | select(.projectId == \"${{ matrix.project }}\")" ../clients.json)
          
          # Generate .env.local
          echo "VITE_FIREBASE_API_KEY=$(echo $CLIENT_CONFIG | jq -r .apiKey)" > .env.local
          echo "VITE_FIREBASE_AUTH_DOMAIN=$(echo $CLIENT_CONFIG | jq -r .authDomain)" >> .env.local
          echo "VITE_FIREBASE_PROJECT_ID=${{ matrix.project }}" >> .env.local
          echo "VITE_FIREBASE_STORAGE_BUCKET=$(echo $CLIENT_CONFIG | jq -r .storageBucket)" >> .env.local
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(echo $CLIENT_CONFIG | jq -r .messagingSenderId)" >> .env.local
          echo "VITE_FIREBASE_APP_ID=$(echo $CLIENT_CONFIG | jq -r .appId)" >> .env.local
          
          # Add extra frontend settings
          echo "VITE_FIREBASE_BUCKET_FOLDER=uploads" >> .env.local
          echo "VITE_INVOICE_EXPIRY_DAYS=7" >> .env.local
          echo "VITE_INBOUND_EMAIL_DOMAIN=office-a.invoices.finlogia.online" >> .env.local
          
          # Dynamically set the Base URL for the current project in the matrix
          echo "VITE_BASE_URL=https://europe-west3-${{ matrix.project }}.cloudfunctions.net" >> .env.local
          
          # Cloud Functions endpoints
          echo "VITE_SIGNED_UPLOAD_URL_PATH=/getSignedUploadUrl_v2" >> .env.local
          echo "VITE_SIGNED_DOWNLOAD_URL_PATH=/getSignedDownloadUrl_v2" >> .env.local
          echo "VITE_UPDATE_INVOICE_FIELDS_PATH=/updateInvoiceFields_v2" >> .env.local
          echo "VITE_UPDATE_PAYMENT_STATUS_PATH=/updatePaymentStatus_v2" >> .env.local
          echo "VITE_UPDATE_SUPPLIER_FIELDS_PATH=/updateSupplierFields_v2" >> .env.local
          echo "VITE_ADD_FINANCIAL_ENTRY_PATH=/addFinancialEntry_v2" >> .env.local
          echo "VITE_EDIT_FINANCIAL_ENTRY_PATH=/editFinancialEntry_v2" >> .env.local
          echo "VITE_DELETE_FINANCIAL_ENTRY_PATH=/deleteFinancialEntry_v2" >> .env.local
          echo "VITE_GET_FINANCIAL_REPORT_PATH=/getFinancialReport_v2" >> .env.local
          echo "VITE_ADD_RECURRING_EXPENSE_PATH=/addRecurringExpense_v2" >> .env.local
          echo "VITE_UPDATE_RECURRING_EXPENSE_PATH=/updateRecurringExpense_v2" >> .env.local
          echo "VITE_GET_RECURRING_EXPENSES_PATH=/getRecurringExpenses_v2" >> .env.local
          echo "VITE_EXPORT_INVOICES_PATH=/exportInvoices_v2" >> .env.local
          echo "VITE_UPDATE_AUDIT_STATUS_PATH=/updateAuditStatus_v2" >> .env.local
          echo "VITE_RECORD_INVOICE_VIEW_PATH=/recordInvoiceView_v2" >> .env.local
          echo "VITE_CREATE_CLIENT_BUSINESS_PATH=/createClientBusiness_v2" >> .env.local
          echo "VITE_ADD_USER_TO_BUSINESS_PATH=/addUserToBusiness_v2" >> .env.local
          echo "VITE_ADD_ACCOUNTANT_PATH=/addAccountant_v2" >> .env.local
          echo "VITE_RESET_USER_PASSWORD_PATH=/resetUserPassword_v2" >> .env.local
          
          # Generate a readable client name from the project ID (e.g. "finlogia-demo" -> "Demo")
          CLIENT_SLUG="${{ matrix.project }}"
          CLIENT_SLUG=${CLIENT_SLUG#finlogia-}
          VITE_CLIENT_NAME=$(echo "$CLIENT_SLUG" | tr '-' ' ' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
          echo "VITE_CLIENT_NAME=\"$VITE_CLIENT_NAME\"" >> .env.local
        working-directory: apps/portal/pwa-client

      - name: Verify Config Matches Project
        run: |
          if ! grep -q "VITE_FIREBASE_PROJECT_ID=${{ matrix.project }}" .env.local; then
            echo "Error: Config mismatch! Expected project ${{ matrix.project }} but got something else."
            exit 1
          fi
        working-directory: apps/portal/pwa-client

      - name: Build Portal for ${{ matrix.project }}
        run: npm run build
        working-directory: apps/portal/pwa-client

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Portal to ${{ matrix.project }}
        run: firebase deploy --only hosting --project ${{ matrix.project }}
        working-directory: apps/portal/pwa-client

      - name: Post-Deployment Smoke Test
        run: |
          # Wait a few seconds for CDN propagation
          sleep 5
          # Curl the deployed URL and verify it returns a 200 OK and contains the app root div
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://${{ matrix.project }}.web.app)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: Smoke test failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          
          if ! curl -s https://${{ matrix.project }}.web.app | grep -q "<div id=\"app\">"; then
            echo "Error: Smoke test failed, could not find <div id=\"app\"> in response"
            exit 1
          fi
          echo "Smoke test passed successfully!"
