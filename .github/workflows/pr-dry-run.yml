name: PR Dry Run (Staging)

on:
  pull_request:
    branches:
      - main

jobs:
  dry-run-deploy:
    runs-on: ubuntu-latest
    # We use a dedicated staging project for PR dry runs
    env:
      STAGING_PROJECT: finlogia-staging-tenant
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (for Firebase Emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Root Dependencies
        run: |
          rm -rf package-lock.json node_modules
          npm install

      - name: Run Backend Integration Tests
        run: npm run test:integration
        working-directory: apps/backend

      - name: Run Security Rules Tests (with Emulators)
        run: npm run test:rules
        working-directory: apps/backend

      - name: Run Portal Unit Tests
        run: npm run test
        working-directory: apps/portal/pwa-client

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV
        working-directory: apps/portal/pwa-client

      - name: Cache playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/portal/pwa-client
        
      - name: Install Playwright OS Dependencies
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/portal/pwa-client

      - name: Run Portal E2E Tests
        run: npm run test:e2e
        working-directory: apps/portal/pwa-client

      # In a real setup, you would authenticate and deploy to the staging project here
      # just like in deploy.yml, to ensure the build and deploy steps actually work.
